  <script>
    class Draw_Support {
      constructor() {
        this.supports = [
          {
            name: 'ธกส (BAAC)',
            account_number: '020239539534',
            account_name: 'นาย ชานนท์ อาจใจ',
            image: 'support/034.png'
          },
          {
            name: 'กรุงไทย (KTB)',
            account_number: '6650206482',
            account_name: 'นาย ชานนท์ อาจใจ',
            image: 'support/006.png'
          },
          {
            name: 'ทรูมันนี่ วอลเล็ท (TrueMoney Wallet)',
            account_number: '0825781902',
            account_name: 'นาย ชานนท์ อาจใจ',
            image: 'support/true_money.png'
          }

        ];
      }

      draw() {
        const container = document.getElementById('support_draw');
        this.supports.forEach(support => {
          const supportDiv = document.createElement('div');
          supportDiv.classList.add('support', 'logo');
          supportDiv.innerHTML = `<section class="about" id="home"> <div class="max-width"><img src="${support.image}" style="border-radius: 15%;" alt="${support.name}" width="200" height="200"><p style="background-color: rgba(8, 102, 255, 0.8); color: white; border-radius: 15px; padding: 0.5rem;">${support.name}<br>เลขที่บัญชี: ${support.account_number}<br>ชื่อบัญชี: ${support.account_name}</p></div></section>`;
          container.appendChild(supportDiv);
        });
      }
    }
    document.addEventListener('DOMContentLoaded', function () {
      const drawSupport = new Draw_Support();
      drawSupport.draw();
    });
